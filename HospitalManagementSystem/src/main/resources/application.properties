spring.application.name=HospitalManagementSystem


# DATABASE CONFIGURATION

spring.datasource.url=jdbc:mysql://localhost:3306/hospital_management_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# HIKARI CONNECTION POOL

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# LOGGING

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.com.hms=INFO

# JACKSON JSON

spring.jackson.time-zone=UTC
#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# SERVER ERROR DETAILS


server.error.include-message=always
server.error.include-binding-errors=always

# CONSOLE COLORS

spring.output.ansi.enabled=ALWAYS

# JWT Config
#jwt.secret=5468576D5A7134743777217A25432A46294A404E635266556A586E3272357538
#jwt.expiration=86400000
#jwt.refresh-expiration=604800000
jwt.secret=5468576D5A7134743777217A25432A46294A404E635266556A586E3272357538
jwt.expiration=86400000
springdoc.paths-to-match=/api/v1/**


